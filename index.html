
<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisas webserver</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      padding: 50px 35px;
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      max-width: 700px;
      width: 90%;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      opacity: 0.95;
    }

    .badge {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 18px;
      border-radius: 999px;
      background: white;
      color: #5a3ea7;
      font-weight: bold;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }

      p {
        font-size: 1rem;
      }

      .container {
        padding: 35px 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Välkommen till Lisas webserver</h1>
    <p>
      Det här är en modern och stilren startsida skapad i HTML och CSS.
      Servern är igång och redo att användas.
    </p>
    <div class="badge">Driftstatus: Online</div>
  </div>
</body>
</html>
